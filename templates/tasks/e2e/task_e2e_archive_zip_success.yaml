apiVersion: v1
kind: pipeline
metadata:
  id: task_e2e_archive_zip_success__TEMPLATE
  role: implementer
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "E2E: archive_zip success"
  category: implementer
runtime:
  timeout_ms: 60000
steps:
  - id: step1_seed_files
    task:
      kind: file_write
      files:
        - path: "generated/__PIPELINE_RUN_ID__/a.txt"
          text: "A\n"
          mode: overwrite
        - path: "generated/__PIPELINE_RUN_ID__/b.txt"
          text: "B\n"
          mode: overwrite
  - id: step2_archive_zip
    task:
      kind: archive_zip
      inputs:
        - "generated/__PIPELINE_RUN_ID__/**"
      output:
        zip_path: "bundles/output.zip"
        manifest_path: "bundles/output_manifest.json"
      options:
        follow_symlinks: false
      limits:
        max_files: 200
        max_total_bytes: 10485760
acceptance:
  - type: artifact_exists
    path: "bundles/output.zip"
  - type: artifact_exists
    path: "bundles/output_manifest.json"
  - type: artifact_json_pointer_equals
    path: "bundles/output_manifest.json"
    pointer: "/total_files"
    equals: 2
