apiVersion: v1
kind: Task
metadata:
  id: task_e2e_artifact_pwsh__TEMPLATE
  role: e2e
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "E2E: artifact success path (powershell)"
  category: e2e
spec:
  command: run_command
  args:
    mode: command
    command: >-
      "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -Command "$ws=$env:REGION_AI_WORKSPACE; if([string]::IsNullOrWhiteSpace($ws)){ throw 'REGION_AI_WORKSPACE missing' }; $rid=$env:REGION_AI_RUN_ID; if([string]::IsNullOrWhiteSpace($rid)){ throw 'REGION_AI_RUN_ID missing' }; $d=Join-Path $ws ('runs\' + $rid + '\files'); New-Item -ItemType Directory -Path $d -Force | Out-Null; $f=Join-Path $d 'artifact.txt'; Set-Content -LiteralPath $f -Value 'ARTIFACT_OK' -Encoding utf8; [Console]::WriteLine('ARTIFACT_OK'); [Console]::Out.Flush(); exit 0"
  context:
    repo_path: "."
  runtime:
    timeout_ms: 10000
    timeout_expected: false
  acceptance:
    - type: stdout_contains
      text: "ARTIFACT_OK"
    - type: command_exit_code
      exit_code: 0
    - type: artifact_exists
      path: "artifact.txt"
