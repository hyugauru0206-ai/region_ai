apiVersion: v1
kind: pipeline
metadata:
  id: task_e2e_pipeline_success__TEMPLATE
  role: implementer
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "E2E: pipeline success"
  category: implementer
runtime:
  timeout_ms: 60000
steps:
  - id: step1_patch
    task:
      kind: patch_apply
      patch:
        format: unified
        text: |
          --- /dev/null
          +++ b/runs/__PIPELINE_RUN_ID__/files/pipeline.txt
          @@ -0,0 +1 @@
          +HELLO_PIPELINE
  - id: step2_cmd
    task:
      kind: run_command
      args:
        command: >-
          "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -Command "[Console]::WriteLine('PIPELINE_STEP2_OK'); [Console]::Out.Flush(); exit 0"
acceptance:
  - type: stdout_contains
    text: "PIPELINE_STEP2_OK"
