apiVersion: v1
kind: pipeline
metadata:
  id: task_e2e_recipe_ops_snapshot__TEMPLATE
  role: implementer
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "E2E: recipe ops snapshot"
  category: implementer
artifact:
  mirror_run_meta: true
runtime:
  timeout_ms: 120000
steps:
  - id: step1_write_ops_snapshot
    task:
      kind: file_write
      files:
        - path: "ops_snapshot_e2e.md"
          text: |
            # Ops Snapshot

            - output_file: ops_snapshot_e2e.md

            ## Whiteboard
            - Now: e2e
            - DoD: e2e
            - last_design_id: e2e

            ## Inbox (Recent Top 20)
            - sample

            ## Mentions (Top 10)
            - sample

            ## Taskify Tracking (Top 10)
            - sample

            ## Runs (Top 10)
            - sample
          mode: overwrite
  - id: step2_best_effort_ops_snapshot_notify_probe
    task:
      kind: run_command
      args:
        command: >-
          "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -Command "$ws = if ($env:REGION_AI_WORKSPACE) { $env:REGION_AI_WORKSPACE } else { Join-Path $env:LOCALAPPDATA 'region_ai\workspace' }; $p = Join-Path $ws 'ui\desktop\inbox.jsonl'; $hit = $false; if (Test-Path -LiteralPath $p) { try { $hit = Select-String -Path $p -Pattern '\"source\":\"export_ops_snapshot\"' -SimpleMatch -Quiet -ErrorAction Stop } catch { $hit = $false } }; [Console]::WriteLine(('OPS_SNAPSHOT_INBOX_NOTIFY_PRESENT=' + ([string]$hit).ToLower())); [Console]::Out.Flush(); exit 0"
acceptance:
  - type: artifact_exists
    path: "written/ops_snapshot_e2e.md"
  - type: artifact_file_contains
    path: "written/ops_snapshot_e2e.md"
    contains: "Ops Snapshot"
  - type: artifact_file_contains
    path: "written/ops_snapshot_e2e.md"
    contains: "ops_snapshot_"
  - type: artifact_file_regex
    path: "written/ops_snapshot_e2e.md"
    pattern: "## Whiteboard"
  - type: artifact_file_regex
    path: "written/ops_snapshot_e2e.md"
    pattern: "## Inbox"
  - type: artifact_file_regex
    path: "written/ops_snapshot_e2e.md"
    pattern: "## Runs"
  - type: stdout_contains
    text: "OPS_SNAPSHOT_INBOX_NOTIFY_PRESENT="
