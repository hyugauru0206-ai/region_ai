apiVersion: v1
kind: Task
metadata:
  id: task_e2e_timeout_normal_pwsh_template
  role: 讀懆ｨｼ
  assignee: implementer_01
  created_at: "2026-02-22T00:00:00+09:00"
  title: "E2E: timeout normal failure (powershell)"
  category: 讀懆ｨｼ
spec:
  command: run_command
  args:
    mode: command
    command: >-
      "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -Command "[Console]::WriteLine('DONE'); [Console]::Out.Flush(); Start-Sleep -Seconds 30"
  context:
    repo_path: "."
  runtime:
    timeout_ms: 2000
  acceptance:
    - type: stdout_contains
      text: "DONE"
