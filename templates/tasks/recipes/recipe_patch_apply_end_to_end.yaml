# recipe:
#   id: patch_apply_end_to_end
#   title: "Patch apply end-to-end"
#   expect: success
#   uses: [pipeline, file_write, patch_apply, run_command, artifact_json_pointer, run_meta]
#   notes: "copy-ready; E2E guard exists"
apiVersion: v1
kind: pipeline
metadata:
  id: recipe_patch_apply_end_to_end
  role: implementer
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "Recipe: patch_apply end-to-end with audit snapshots"
  category: implementer
artifact:
  mirror_run_meta: true
runtime:
  timeout_ms: 60000
steps:
  - id: step1_seed_file
    task:
      kind: file_write
      files:
        - path: "src/hello.txt"
          text: |
            line1
            line2
            line3
          mode: overwrite
  - id: step2_patch_apply
    task:
      kind: patch_apply
      patch:
        format: unified
        text: |
          --- a/src/hello.txt
          +++ b/src/hello.txt
          @@ -1,3 +1,4 @@
           line1
          -line2
          +line2_patched
           line3
          +line4_added
  - id: step3_verify_stdout
    task:
      kind: run_command
      args:
        command: >-
          "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -Command "[Console]::WriteLine((Get-Content -Raw '__WORKSPACE_ROOT__/src/hello.txt')); [Console]::Out.Flush(); exit 0"
acceptance:
  - type: stdout_contains
    text: "line2_patched"
  - type: stdout_contains
    text: "line4_added"
  - type: artifact_file_contains
    path: "_meta/task.yaml"
    contains: "patch_apply"
  - type: artifact_json_pointer_exists
    path: "_meta/result.json"
    pointer: "/outcome"
