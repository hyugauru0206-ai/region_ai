# recipe:
#   id: release_bundle
#   title: "Release bundle"
#   expect: success
#   uses: [pipeline, file_write, archive_zip, artifact_zip_entry, artifact_json_pointer, run_meta]
#   notes: "copy-ready; E2E guard exists"
apiVersion: v1
kind: pipeline
metadata:
  id: recipe_release_bundle
  role: implementer
  assignee: implementer_01
  created_at: "1970-01-01T00:00:00+09:00"
  title: "Recipe: release bundle with zip entry acceptance"
  category: implementer
artifact:
  mirror_run_meta: true
runtime:
  timeout_ms: 60000
steps:
  - id: step1_seed_files
    task:
      kind: file_write
      files:
        - path: "generated/a.txt"
          text: "A\n"
          mode: overwrite
        - path: "generated/b.txt"
          text: "B\n"
          mode: overwrite
        - path: "data/sample.json"
          text: '{"a":{"b":[{"c":"OK"}]}}'
          mode: overwrite
  - id: step2_archive_zip
    task:
      kind: archive_zip
      inputs:
        - "generated/**"
        - "data/**"
      output:
        zip_path: "bundles/release.zip"
        manifest_path: "bundles/release_manifest.json"
      options:
        follow_symlinks: false
      limits:
        max_files: 200
        max_total_bytes: 10485760
acceptance:
  - type: artifact_exists
    path: "bundles/release.zip"
  - type: artifact_exists
    path: "bundles/release_manifest.json"
  - type: artifact_exists
    path: "_meta/task.yaml"
  - type: artifact_exists
    path: "_meta/result.json"
  - type: artifact_zip_entry_exists
    zip_path: "bundles/release.zip"
    entry: "generated/a.txt"
  - type: artifact_zip_entry_exists
    zip_path: "bundles/release.zip"
    entry: "generated/b.txt"
  - type: artifact_zip_entry_exists
    zip_path: "bundles/release.zip"
    entry: "data/sample.json"
  - type: artifact_json_pointer_gte
    path: "bundles/release_manifest.json"
    pointer: "/total_files"
    value: 3
  - type: artifact_json_pointer_equals
    path: "written/data/sample.json"
    pointer: "/a/b/0/c"
    equals: "OK"
